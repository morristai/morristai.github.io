# Local overrides for the DoIt theme's Traditional Chinese i18n strings.
# Hugo merges these on top of themes/DoIt/i18n/zh-TW.toml — we only redefine
# keys we want to change.

[publishedOnDate]
other = "{{ .Date }}"

# Override theme's "閱讀原始文檔" link label on post pages.
[readMarkdown]
other = "閱讀 Markdown"

# Home sidebar (layouts/partials/home/sidebar.html)
[homeSidebarNow]
other = "近況"

# Home sidebar footer quote (localized; overrides params.toml values).
[homeSidebarQuote]
other = "世界上只有一種英雄主義，就是看清生活的真相之後，依然熱愛生活。"

[homeSidebarQuoteAuthor]
other = "羅曼·羅蘭"
